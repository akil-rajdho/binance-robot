services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bitcoin
      POSTGRES_PASSWORD: bitcoin
      POSTGRES_DB: bitcoinrobot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitcoin -d bitcoinrobot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - POSTGRES_DSN=postgres://bitcoin:bitcoin@postgres:5432/bitcoinrobot?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DEPLOY_TOKEN=${DEPLOY_TOKEN}
      - DEPLOY_SCRIPT=/project/deploy.sh
      - BOT_AUTOSTART=${BOT_AUTOSTART:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/binance-robot:/project
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_WS: wss://akil.cooleta.al/ws
        NEXT_PUBLIC_BACKEND_API: https://akil.cooleta.al/api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_WS=wss://akil.cooleta.al/ws
      - NEXT_PUBLIC_BACKEND_API=https://akil.cooleta.al/api
    depends_on:
      - backend

volumes:
  pgdata:
